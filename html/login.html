<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/mzansi-buys-store/css/login.css">
    <title>Login</title>
</head>
<body>
    <div class="container">
        <header>
            <img src="/mzansi-buys-store/assets/mzansi buy store logo.png" alt="Online store logo" >
            <div class="login-text">
                <h1>Welcome Back!</h1>
                <p>Check for updates and any new products added</p>
            </div> 
        </header>
             <form action="" id="login-form">
            <fieldset>
                <h2>Login</h2>
                <input type="email" placeholder="Email Address" class="input-form">
                <input type="password" placeholder="Password" class="input-form">
                <button>Login</button>
                <p>Don't have an account?<a href="/mzansi-buys-store/html/signup.html" target="_blank">Register</a></p>
            </fieldset>
            
        </form>
       
    </div>

<script src="/mzansi-buys-store/scripts/login.js"></script>
</body>
</html>
