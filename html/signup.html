<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/mzansi-buys-store/css/signup.css">
    <title>Login</title>
</head>
<body>
    <div class="container">
        <header>
            <img src="/mzansi-buys-store/assets/mzansi buy store logo.png" alt="Online store logo" >
            <div class="signup-text">
                <h1>Get Started</h1>
                <p>Mzansi Store Buy is an online store that sells retail products</p>
            </div> 
        </header>
             <form action="">
            <fieldset>
                <h2>Sign Up</h2>
                <div class="f-l-names">
                    <input type="text" placeholder="First Name">
                    <input type="text" placeholder="Last Name">
                </div>
                <input type="text" placeholder="Email Address" class="input-form">
                <input type="text" placeholder="Password" class="input-form">
                <input type="text" placeholder="Confirm Password" class="input-form">
                <button>Create Account</button>
                <p>Already have an account?<a href="/mzansi-buys-store/html/login.html" target="_blank">Sign in</a></p>
            </fieldset>
            
        </form>
       
    </div>

    <script src="/mzansi-buys-store/scripts/script.js"></script>
</body>
</html>
